# BSLoRA Config (Bi-Share / Block-Sparse LoRA)
peft:
  method: "bslora"
  r: 128
  lora_alpha: 256
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_dropout: 0.05
  bias: "none"
  use_dora: false

training:
  learning_rate: 3.0e-5
  num_epochs: 1
